  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: PCD8544 Framebuffer Display Driver Stack for ESP32 (ESP-IDF)
        link: https://github.com/sourjyabose/PCD8544-FRAMEBUFFER-DISPLAY-DRIVER-STACK-FOR-ESP32-ESP-IDF
        # link_text: Project Website
        additional_links:
          - title:  sourjyabose/PCD8544-FRAMEBUFFER-DISPLAY-DRIVER-STACK-FOR-ESP32-ESP-IDF
            icon: fab fa-github
            url: https://github.com/sourjyabose/PCD8544-FRAMEBUFFER-DISPLAY-DRIVER-STACK-FOR-ESP32-ESP-IDF
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        
        description: | # this will include new lines to allow paragraphs
          - Built a from-scratch custom LCD driver stack for the Nokia 5110 LCD Module (PCD8544 controller) on Espressif Systems ESP32 using ESP-IDF, implementing GPIO bit-banged serial transport, CE/DC/RST sequencing, and PCD8544 48×84 framebuffer page writes
  
          - Implemented a framebuffer flush pipeline with scanline-to 8px-page conversion and full-frame serialized transfer into display controller RAM. 

          - Developed an integer-only raster engine (Bresenham line + midpoint circle) with incremental decision logic and 
          linked-list based coordinate staging for deferred framebuffer rendering. 

          - Built an 8×8 bitmap font renderer with ASCII mapping, and direct framebuffer glyph composition.  

          - Designed a text layout + marquee system supporting incremental framebuffer shifting for scrolling output. 

          - Created a graphics driver API for pixel, line, rectangle, triangle, circle and batch framebuffer composition before hardware flush. 

          - Integrated FreeRTOS for timed execution and deterministic display refresh scheduling.

      - layout: top-middle
        title: CloudVPN+
        
        # link_text: Project Website
        
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        
        description: | # this will include new lines to allow paragraphs
          CloudVPN+ is our (Sourjya Basu(me) , Krishna Sharma , Roshan ,Kartik Rohit)  final year project building a cost-efficient VPN system based on a three-layer architecture (Browser Extension → Local Client App → Server) where browser traffic is routed through a local client and securely forwarded to backend servers over a persistent connection.

          The design rationale: browser extension can only redirect traffic but cannot process any of it. The main challenge is communication between local client app and server. 

          So in this project my work focuses on designing and implementing the core networking infrastructure, including protocol design and concurrent data transport systems, till now I built the following: 

          Developed a custom TCP tunneling and multiplexing system where multiple logical TCP streams are encapsulated, tagged, and routed over one underlying persistent connection to our servers, significantly reducing connection overhead while maintaining isolation between streams.

          This system was implemented from scratch using raw sockets, without relying on external networking frameworks or libraries, to achieve fine-grained control over protocol design, data flow, and connection management.



          My Key Contributions:

          • Designed a custom multiplexed transport protocol with custom binary framing for stream identification and packet routing.

          • Implemented full-duplex communication between client, server, and dynamic target endpoints.

          • Built a multithreaded architecture with producer–consumer queues for efficient data handling.

          • Implemented dynamic socket management with per-stream connection tracking for scalable routing.

          • Handled TCP stream fragmentation with custom reassembly logic.

          • Integrated with browser extension via PAC scripts for transparent traffic routing.
