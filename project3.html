<title>Basic Canvas</title>
<body style="background-color:black;color:white;">
<center><canvas id="myCanvas" width="615" height="30"
style="border:1px solid #d3d3d3;height:auto;width:100%;background-color:blue;">
Your browser does not support the canvas element.
</canvas><br><p id="speed"></p>
<button onmousedown="axz+=-1;" style="width:50%;height:100%;background-color:black;border-style:none;"></button><button style="width:50%;height:100%;background-color:black;border-style:none;" onmousedown="axz+=+1;;"></button>
</center>
</p>
<script>
var axz=0;
document.onkeydown = checkKey;
function checkKey(e) {
switch (e.keyCode) {
case 38:
break;
case 40:
break;
case 37:
axz-=1;
break;
case 39:
axz+=1;
break;
}
}
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
var x=canvas.width/2;
function i1(pqr){
x+=pqr;
}
function draw(){
var msg=new Date();ctx.font = "30px Arial";
ctx.strokeText(msg,x,(canvas.height/2)+10);
ctx.strokeStyle = "white";
}
function call(){
ctx.clearRect(0, 0, canvas.width, canvas.height);
}
var printSpeed;
function g(){
if(axz>0){printSpeed="Moving Right by "+axz*10+"pixels/seconds";console.log("CURRENT SPEED IS "+axz*10);}
else if(0>axz){printSpeed="Moving Left by "+axz*-10+"pixels/seconds";console.log("CURRENT SPEED IS "+axz*10);}
else if(axz==0){printSpeed="Moving Left/Right by 0pixels/seconds<br><br>Click here to start";console.log("CURRENT SPEED IS "+axz*10);}
else{printSpeed="<p style='color:red;'><strong>ERROR</strong></p>";}
i1(axz);
if(x>canvas.width){x=-280;}
if(x+280<0){x=canvas.width;}
document.getElementById('speed').innerHTML=printSpeed;
draw();
setTimeout(call,90);
}
setInterval(g,100);
</script>
